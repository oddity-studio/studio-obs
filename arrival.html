<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Arrival - OBS Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital 1,wght@1,900&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: 'Exo 2', sans-serif;
  color: white;
}

#video-overlay {
  position: fixed;
  bottom: 12vh;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1001;
  pointer-events: none;
  opacity: 1;
  transition: opacity 1s ease;
}

#video-overlay video {
  max-width: 90vw;
  max-height: 90vh;
}

#arrival {
  position: absolute;
  bottom: 10vh;
  left: 50%;
  transform: translateX(-50%);
  padding: 28px 48px;
  min-width: 700px;
  background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
  border: 2px solid #d4af37;
  border-radius: 24px;
  box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.5);
  text-align: center;
  opacity: 0;
  z-index: 1000;
}

#arrival.show {
  animation: fadeIn 0.5s ease forwards;
}

#arrival.fade-out {
  animation: fadeOut 1s ease forwards;
}

#video-overlay.show {
  animation: fadeIn 0.5s ease forwards;
}

#video-overlay.fade-out {
  animation: fadeOut 1s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

#arrival::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
}

.joined {
  font-size: 48px;
  font-style: italic;
  font-weight: 900;
  color: #d4af37;
  text-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
  margin-bottom: 8px;
  opacity: 0;
  transform: translateX(-50px);
}

.joined.slide-in {
  animation: slideIn 0.4s ease forwards;
}

@keyframes slideIn {
  from { 
    opacity: 0;
    transform: translateX(-50px);
  }
  to { 
    opacity: 1;
    transform: translateX(0);
  }
}

.welcome {
  font-size: 24px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #e8e8e8;
  opacity: 0.8;
  overflow: hidden;
  white-space: nowrap;
}

.welcome span {
  display: inline-block;
  opacity: 0;
}

.welcome.typing span {
  animation: typeIn 0.05s ease forwards;
}

@keyframes typeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.loading {
  font-size: 32px;
  color: #d4af37;
  font-style: italic;
  font-weight: 900;
}
</style>
</head>

<body>

<div id="video-overlay">
  <video id="arrival-video" src="resources/Data.webm" muted></video>
</div>

<div id="arrival">
  <div class="loading">LOADING...</div>
</div>

<script>
let currentUsername = '';
let fadeTimeout = null;
let typingTimeout = null;
const apiUrl = 'https://www.audeobox.com/api/feeds/newest-users.xml';

function playVideo() {
  const video = document.getElementById('arrival-video');
  video.currentTime = 0;
  video.play();
}

function typeWriter(element, text, callback) {
  if (typingTimeout) clearTimeout(typingTimeout);
  element.innerHTML = '';
  let i = 0;
  
  function type() {
    if (i < text.length) {
      const char = text[i] === ' ' ? '&nbsp;' : text[i];
      element.innerHTML += '<span>' + char + '</span>';
      i++;
      typingTimeout = setTimeout(type, 30);
    } else if (callback) {
      callback();
    }
  }
  type();
}

function showArrival(username) {
  const container = document.getElementById("arrival");
  const videoOverlay = document.getElementById("video-overlay");
  
  container.classList.remove('fade-out');
  videoOverlay.classList.remove('fade-out');
  container.classList.add('show');
  videoOverlay.classList.add('show');
  
  container.innerHTML = `
    <div class="joined">${username} just joined</div>
    <div class="welcome"><span></span></div>
  `;
  
  playVideo();
  
  setTimeout(() => {
    const joinedEl = container.querySelector('.joined');
    joinedEl.classList.add('slide-in');
    
    setTimeout(() => {
      const welcomeEl = container.querySelector('.welcome');
      welcomeEl.classList.add('typing');
      typeWriter(welcomeEl, 'WELCOME TO AUDEOBOX');
    }, 200);
  }, 300);
  
  if (fadeTimeout) clearTimeout(fadeTimeout);
  fadeTimeout = setTimeout(() => {
    container.classList.add('fade-out');
    container.classList.remove('show');
    videoOverlay.classList.add('fade-out');
    videoOverlay.classList.remove('show');
  }, 5000);
}

async function checkForNewUser() {
  console.log('Checking for new user...');
  try {
    const corsResponse = await fetch('https://corsproxy.io/?' + apiUrl);
    const text = await corsResponse.text();
    
    if (text) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'text/xml');
      const items = xml.getElementsByTagName('item');
      
      if (items.length > 0) {
        var title = items[0].querySelector('title').textContent;
        var username = title.split(' — ')[0].replace('Welcome ', '').trim();
        
        if (username !== currentUsername) {
          console.log('New user detected:', username, '- triggering re-render');
          currentUsername = username;
          showArrival(username);
        }
      }
    }
  } catch (e) {}
  
  setTimeout(checkForNewUser, 5000);
}

async function loadNewestUser() {
  console.log('Initial load: checking for newest user...');
  try {
    const corsResponse = await fetch('https://corsproxy.io/?' + apiUrl);
    const text = await corsResponse.text();
    
    if (text) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'text/xml');
      const items = xml.getElementsByTagName('item');
      
      if (items.length > 0) {
        var title = items[0].querySelector('title').textContent;
        var username = title.split(' — ')[0].replace('Welcome ', '').trim();
        currentUsername = username;
        
        showArrival(username);
        setTimeout(checkForNewUser, 5000);
        return;
      }
    }
  } catch (e) {}
  
  currentUsername = fallback;
  showArrival(fallback);
  setTimeout(checkForNewUser, 5000);
}

const fallback = "New Producer";

loadNewestUser();
</script>

</body>
</html>
