<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OBS Rankings Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital 1,wght@1,900&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: 'Exo 2', sans-serif;
  color: white;
}

#rankings {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  min-width: 260px;
  padding: 28px 36px;
  background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
  border: 2px solid #d4af37;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(212, 175, 55, 0.3), inset 0 0 60px rgba(0, 0, 0, 0.5);
  opacity: 1;
  transition: opacity 1s ease;
}

#rankings.fade-out {
  opacity: 0;
}

#rankings::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, #d4af37, transparent);
}

#rankings h1 {
  margin: 0 0 18px;
  font-size: 20px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  text-align: center;
  font-family: 'Exo 2', sans-serif;
  font-style: italic;
  font-weight: 900;
  color: #d4af37;
  text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
}

.rank {
  display: flex;
  gap: 14px;
  font-size: 22px;
  line-height: 1.5;
  opacity: 0;
  animation: fadeIn 0.35s ease forwards;
  font-family: 'Exo 2', sans-serif;
  font-weight: 400;
}

.rank span {
  min-width: 26px;
  text-align: right;
  color: #d4af37;
  font-style: italic;
  font-weight: 900;
  text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
}

.rank .name {
  font-style: normal;
  font-weight: 400;
  color: #e8e8e8;
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<div id="rankings">
  <h1>Top Producers</h1>
</div>

<script>
async function loadRankings() {
  const container = document.getElementById("rankings");
  const apiUrl = 'https://www.audeobox.com/api/feeds/top-producers.xml';
  
  let text = null;
  try {
    const corsResponse = await fetch('https://corsproxy.io/?' + apiUrl);
    text = await corsResponse.text();
  } catch (e) {
    try {
      const corsResponse = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl));
      text = await corsResponse.text();
    } catch (e2) {}
  }
  
  var top10 = [];
  
  if (text) {
    const parser = new DOMParser();
    const xml = parser.parseFromString(text, 'text/xml');
    const items = xml.getElementsByTagName('item');
    
    for (var i = 0; i < Math.min(10, items.length); i++) {
      var title = items[i].querySelector('title').textContent;
      var name = title.replace('#' + (i + 1) + ' — ', '').replace(/\s*\(\d+\s+season points\)/, '').trim();
      top10.push(name);
    }
  } else {
    top10 = fallback;
  }
  
  renderList(top10);
  
  setTimeout(() => {
    container.classList.add('fade-out');
  }, 20000);
  
  function renderList(list) {
    list.forEach((name, i) => {
      const row = document.createElement("div");
      row.className = "rank";
      row.style.animationDelay = (i * 0.08) + 's';
      row.innerHTML = `<span>${i + 1}</span><div><span class="name">${name}</span></div>`;
      container.appendChild(row);
    });
  }
}

const fallback = [
  "BrainGotBlaps",
  "Sik TrAKz",
  "Hi I'm Ari",
  "Sullymon",
  "BRYCKZ",
  "EugeneMack",
  "GLITXH",
  "Xi_ReBooT_iX",
  "MikeyB",
  "Suffer808"
];

loadRankings();
</script>

</body>
</html>
